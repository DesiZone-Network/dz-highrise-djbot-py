name: Deploy to or-dz-prd-db-02

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: deploy-db02
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop services
        run: |
          sudo systemctl stop dz-highrise-djbot-py@config.service dz-highrise-djbot-py@config2.service || true

      - name: Deploy files to /opt/dz-highrise-djbot-py (preserve .env + firebaseapi.json)
        run: |
          sudo mkdir -p /opt/dz-highrise-djbot-py
          # Backup .env and firebaseapi.json before rsync --delete
          if [ -f /opt/dz-highrise-djbot-py/.env ]; then
            sudo cp /opt/dz-highrise-djbot-py/.env /tmp/dz-highrise-djbot-py.env
          fi
          if [ -f /opt/dz-highrise-djbot-py/firebaseapi.json ]; then
            sudo cp /opt/dz-highrise-djbot-py/firebaseapi.json /tmp/dz-highrise-djbot-py.firebaseapi.json
          fi
          sudo rsync -a --delete \
            --exclude '.git' --exclude '.github' --exclude '.env' --exclude 'firebaseapi.json' \
            --exclude '__pycache__' --exclude '.pytest_cache' \
            ./ /opt/dz-highrise-djbot-py/
          # Restore .env and firebaseapi.json
          if [ -f /tmp/dz-highrise-djbot-py.env ]; then
            sudo mv /tmp/dz-highrise-djbot-py.env /opt/dz-highrise-djbot-py/.env
          fi
          if [ -f /tmp/dz-highrise-djbot-py.firebaseapi.json ]; then
            sudo mv /tmp/dz-highrise-djbot-py.firebaseapi.json /opt/dz-highrise-djbot-py/firebaseapi.json
          fi
          sudo chown -R dzbot:dzbot /opt/dz-highrise-djbot-py
          sudo chmod 600 /opt/dz-highrise-djbot-py/.env /opt/dz-highrise-djbot-py/firebaseapi.json 2>/dev/null || true

      - name: Sync deps (uv)
        run: |
          sudo -u dzbot bash -lc 'cd /opt/dz-highrise-djbot-py && rm -rf /opt/dz-highrise-djbot-py/.venv
          /opt/dzbot/.local/bin/uv sync --frozen || rm -rf /opt/dz-highrise-djbot-py/.venv
          /opt/dzbot/.local/bin/uv sync'

      - name: Start services
        run: |
          sudo systemctl daemon-reload
          sudo systemctl start dz-highrise-djbot-py@config.service dz-highrise-djbot-py@config2.service

      - name: Verify status
        run: |
          sudo systemctl --no-pager --full status dz-highrise-djbot-py@config.service | head -n 25
          echo '---'
          sudo systemctl --no-pager --full status dz-highrise-djbot-py@config2.service | head -n 25

      - name: Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1.15.2
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_PRIVATE }}
          status: ${{ job.status }}
          title: "🛠️ Deploy: dz-highrise-djbot-py"
          description: |
            **Status:** ${{ job.status }}
            **Repo:** ${{ github.repository }}
            **Commit:** ${{ github.sha }}
          color: 0x26b5ce
          noprefix: true
          nocontext: true
          nodetail: true
          notimestamp: true
