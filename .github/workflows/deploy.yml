name: deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: [self-hosted, arm64, oci, db02, python]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install uv

      - name: Deploy code
        run: |
          sudo mkdir -p /opt/dz-highrise-djbot-py
          sudo rsync -a --delete --exclude '.git' --exclude '.github' ./ /opt/dz-highrise-djbot-py/
          sudo chown -R dzbot:dzbot /opt/dz-highrise-djbot-py

      - name: Sync deps (venv)
        run: |
          sudo -u dzbot bash -lc 'cd /opt/dz-highrise-djbot-py && uv sync --frozen || uv sync'

      - name: Restart service
        run: |
          sudo systemctl daemon-reload
          sudo systemctl restart dz-highrise-djbot-py.service
          sudo systemctl --no-pager --full status dz-highrise-djbot-py.service
