name: deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: [self-hosted, arm64, oci, db02, python]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install uv

      - name: Sync deps
        run: |
          uv sync --frozen || uv sync

      - name: Deploy to /opt/dz-highrise-djbot-py
        run: |
          sudo mkdir -p /opt/dz-highrise-djbot-py
          sudo rsync -a --delete --exclude '.git' --exclude '.github' ./ /opt/dz-highrise-djbot-py/

      - name: Restart service
        run: |
          sudo systemctl daemon-reload
          sudo systemctl restart dz-highrise-djbot-py.service
          sudo systemctl --no-pager --full status dz-highrise-djbot-py.service
